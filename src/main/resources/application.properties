spring.application.name=vulnerable-todo-app
server.port=8080

# VULNERABLE (CWE-798, CWE-259): hardcoded credentials committed to source control.
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.h2.Driver

# VULNERABLE (CWE-16): H2 web console exposed and reachable without additional auth.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# VULNERABLE (CWE-798): static application secret checked into the repo, reused for
# password hashing salt and "session token" signing in util/CryptoUtil.java.
app.secret-key=supersecret123

# VULNERABLE (CWE-209): stack traces and internal error details are returned to clients.
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-exception=true

# VULNERABLE (CWE-16): all actuator endpoints exposed, including env/heapdump, with no auth.
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

app.upload-dir=./data/uploads
